<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StageRoot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #F8F5F0;
      color: #3E362E;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      text-align: center;
      max-width: 420px;
    }
    h1 {
      color: #697254;
      font-size: 32px;
      letter-spacing: 8px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .tagline {
      color: #92735C;
      font-size: 17px;
      margin-bottom: 40px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .links a {
      display: block;
      padding: 16px 32px;
      background: #FFFDF9;
      border: 1px solid #E8E2DA;
      border-radius: 14px;
      color: #697254;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .links a:hover {
      background: #697254;
      color: #fff;
      border-color: #697254;
    }
    .footer {
      margin-top: 48px;
      color: #B69C85;
      font-size: 13px;
    }
    .footer a {
      color: #697254;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>S T A G E R O O T</h1>
    <p class="tagline">AI Camera Performance Coach</p>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </div>
    <div class="footer">
      <p>&copy; 2026 StageRoot</p>
      <p style="margin-top:4px;"><a href="mailto:support@stageroot.app">support@stageroot.app</a></p>
    </div>
  </div>
</body>
</html>
