<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StageRoot — Şifre Sıfırlama</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #F7F5EF; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .container { max-width: 420px; width: 100%; }
        .brand { text-align: center; margin-bottom: 24px; font-size: 13px; font-weight: 600; color: #2E7B59; letter-spacing: 1.5px; }
        .card { background: #FFFFFF; border-radius: 16px; padding: 32px 24px; box-shadow: 0 1px 4px rgba(21,36,30,0.06); }
        h1 { color: #1F4A3A; font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 8px; }
        .subtitle { color: #6E7A73; font-size: 14px; text-align: center; line-height: 1.5; margin-bottom: 24px; }
        label { display: block; font-size: 13px; color: #6E7A73; margin-bottom: 6px; font-weight: 500; }
        input { width: 100%; padding: 14px 16px; font-size: 15px; border: 1px solid #E6DFD3; border-radius: 12px; background: #F7F5EF; outline: none; margin-bottom: 16px; color: #15241E; }
        input:focus { border-color: #1F4A3A; }
        .btn { width: 100%; padding: 15px; font-size: 15px; font-weight: 500; color: #FFFFFF; background: #1F4A3A; border: none; border-radius: 14px; cursor: pointer; }
        .btn:hover { background: #2C5E46; }
        .btn:disabled { background: #A0AAA4; cursor: not-allowed; }
        .error { color: #B85A46; font-size: 13px; text-align: center; margin-bottom: 12px; display: none; }
        .success { text-align: center; display: none; }
        .success h2 { color: #1F4A3A; font-size: 20px; margin-bottom: 8px; }
        .success p { color: #6E7A73; font-size: 14px; line-height: 1.5; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #A0AAA4; }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">STAGEROOT</div>
        <div class="card" id="form-card">
            <h1>Yeni Şifre Belirle</h1>
            <p class="subtitle">Yeni şifreni gir ve onayla.</p>
            <div class="error" id="error-msg"></div>
            <label for="password">Yeni Şifre</label>
            <input type="password" id="password" placeholder="En az 6 karakter" minlength="6">
            <label for="password-confirm">Şifre Tekrar</label>
            <input type="password" id="password-confirm" placeholder="Şifreni tekrar gir">
            <button class="btn" id="submit-btn" onclick="handleReset()">Şifremi Güncelle</button>
        </div>
        <div class="card success" id="success-card">
            <h2>Şifren Güncellendi</h2>
            <p>Yeni şifrenle uygulamaya giriş yapabilirsin.</p>
        </div>
        <div class="card" id="expired-card" style="display:none;">
            <h1>Link Geçersiz</h1>
            <p class="subtitle">Bu şifre sıfırlama linki geçersiz veya süresi dolmuş. Uygulamadan tekrar şifre sıfırlama talebi oluşturabilirsin.</p>
        </div>
        <p class="footer">StageRoot — Kamera karşısında güçlü konuş</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://ukvpdckldxaqzazemuxr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrdnBkY2tsZHhhcXphemVtdXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE2MTYxMDQsImV4cCI6MjA1NzE5MjEwNH0.a1J_OzXthaIlQ3ZGpdMVhA_Ho0LY70v1Z_tBqrvGnWQ';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        async function init() {
            const hash = window.location.hash;
            const params = new URLSearchParams(hash.replace('#', ''));
            const accessToken = params.get('access_token');
            const refreshToken = params.get('refresh_token');
            const type = params.get('type');
            if (type === 'recovery' && accessToken) {
                const { error } = await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
                if (error) { document.getElementById('form-card').style.display = 'none'; document.getElementById('expired-card').style.display = 'block'; }
            } else { document.getElementById('form-card').style.display = 'none'; document.getElementById('expired-card').style.display = 'block'; }
        }
        async function handleReset() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('password-confirm').value;
            const errorEl = document.getElementById('error-msg');
            const btn = document.getElementById('submit-btn');
            errorEl.style.display = 'none';
            if (password.length < 6) { errorEl.textContent = 'Şifre en az 6 karakter olmalı.'; errorEl.style.display = 'block'; return; }
            if (password !== confirm) { errorEl.textContent = 'Şifreler eşleşmiyor.'; errorEl.style.display = 'block'; return; }
            btn.disabled = true; btn.textContent = 'Güncelleniyor...';
            const { error } = await supabase.auth.updateUser({ password });
            if (error) { errorEl.textContent = error.message || 'Bir hata oluştu.'; errorEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Şifremi Güncelle'; return; }
            document.getElementById('form-card').style.display = 'none'; document.getElementById('success-card').style.display = 'block';
        }
        init();
    </script>
</body>
</html>
