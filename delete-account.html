<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StageRoot — Şifre Sıfırlama</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #F7F5EF; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .container { max-width: 420px; width: 100%; }
        .brand { text-align: center; margin-bottom: 24px; font-size: 13px; font-weight: 600; color: #2E7B59; letter-spacing: 1.5px; }
        .card { background: #FFFFFF; border-radius: 16px; padding: 32px 24px; box-shadow: 0 1px 4px rgba(21,36,30,0.06); }
        h1 { color: #1F4A3A; font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 8px; }
        .subtitle { color: #6E7A73; font-size: 14px; text-align: center; line-height: 1.5; margin-bottom: 24px; }
        label { display: block; font-size: 13px; color: #6E7A73; margin-bottom: 6px; font-weight: 500; }
        input { width: 100%; padding: 14px 16px; font-size: 15px; border: 1px solid #E6DFD3; border-radius: 12px; background: #F7F5EF; outline: none; margin-bottom: 16px; color: #15241E; }
        input:focus { border-color: #1F4A3A; }
        .btn { width: 100%; padding: 15px; font-size: 15px; font-weight: 500; color: #FFFFFF; background: #1F4A3A; border: none; border-radius: 14px; cursor: pointer; }
        .btn:disabled { background: #A0AAA4; cursor: not-allowed; }
        .msg { font-size: 13px; text-align: center; margin-bottom: 12px; padding: 10px; border-radius: 8px; }
        .msg.error { color: #B85A46; background: #FCEBEB; }
        .msg.info { color: #633806; background: #FAEEDA; }
        .hidden { display: none; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #A0AAA4; }
        #debug { font-size: 11px; color: #A0AAA4; margin-top: 12px; word-break: break-all; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">STAGEROOT</div>
        <div class="card" id="main-card">
            <h1 id="title">Yükleniyor...</h1>
            <p class="subtitle" id="subtitle">Lütfen bekle.</p>
            <div class="hidden" id="msg-box"></div>
            <div class="hidden" id="form-area">
                <label for="password">Yeni Şifre</label>
                <input type="password" id="password" placeholder="En az 6 karakter">
                <label for="password-confirm">Şifre Tekrar</label>
                <input type="password" id="password-confirm" placeholder="Şifreni tekrar gir">
                <button class="btn" id="submit-btn">Şifremi Güncelle</button>
                <p id="debug"></p>
            </div>
        </div>
        <p class="footer">StageRoot — Kamera karşısında güçlü konuş</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        var SUPABASE_URL = 'https://ukvpdckldxaqzazemuxr.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrdnBkY2tsZHhhcXphemVtdXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE2MTYxMDQsImV4cCI6MjA1NzE5MjEwNH0.a1J_OzXthaIlQ3ZGpdMVhA_Ho0LY70v1Z_tBqrvGnWQ';
        var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        var dbg = document.getElementById('debug');

        function showMsg(text, type) {
            var el = document.getElementById('msg-box');
            el.textContent = text;
            el.className = 'msg ' + type;
            el.classList.remove('hidden');
        }

        function showForm() {
            document.getElementById('title').textContent = 'Yeni Şifre Belirle';
            document.getElementById('subtitle').textContent = 'Yeni şifreni gir ve onayla.';
            document.getElementById('form-area').classList.remove('hidden');
            dbg.textContent = 'Oturum hazır, şifre girebilirsin.';
        }

        function showExpired(detail) {
            document.getElementById('title').textContent = 'Link Geçersiz';
            document.getElementById('subtitle').textContent = 'Bu link geçersiz veya süresi dolmuş.';
            if (detail) showMsg(detail, 'info');
        }

        async function init() {
            dbg.textContent = 'Sayfa yüklendi, token aranıyor...';
            try {
                var hash = window.location.hash.substring(1);
                var search = window.location.search.substring(1);
                var hp = new URLSearchParams(hash);
                var sp = new URLSearchParams(search);
                var accessToken = hp.get('access_token');
                var refreshToken = hp.get('refresh_token');
                var type = hp.get('type') || sp.get('type');
                var code = sp.get('code');

                dbg.textContent = 'type=' + type + ' token=' + (accessToken ? 'var' : 'yok') + ' code=' + (code ? 'var' : 'yok');

                if (accessToken && type === 'recovery') {
                    dbg.textContent = 'Hash token bulundu, oturum açılıyor...';
                    var r = await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
                    if (r.error) { showExpired('Oturum hatası: ' + r.error.message); dbg.textContent = JSON.stringify(r.error); }
                    else { dbg.textContent = 'Oturum açıldı: ' + r.data.user.email; showForm(); }
                } else if (code) {
                    dbg.textContent = 'Code bulundu, exchange yapılıyor...';
                    var r = await sb.auth.exchangeCodeForSession(code);
                    if (r.error) { showExpired('Kod hatası: ' + r.error.message); }
                    else { showForm(); }
                } else {
                    dbg.textContent = 'Token yok, mevcut oturum kontrol ediliyor...';
                    var r = await sb.auth.getSession();
                    if (r.data && r.data.session) { dbg.textContent = 'Mevcut oturum bulundu.'; showForm(); }
                    else { showExpired('Token bulunamadı.'); dbg.textContent = 'hash: ' + hash.substring(0,80); }
                }
            } catch (e) {
                showExpired('Hata: ' + e.message);
                dbg.textContent = 'init catch: ' + e.message;
            }
        }

        document.getElementById('submit-btn').addEventListener('click', async function() {
            var pw = document.getElementById('password').value;
            var pw2 = document.getElementById('password-confirm').value;
            var btn = document.getElementById('submit-btn');
            document.getElementById('msg-box').classList.add('hidden');
            dbg.textContent = 'Buton tıklandı...';

            if (pw.length < 6) { showMsg('Şifre en az 6 karakter olmalı.', 'error'); return; }
            if (pw !== pw2) { showMsg('Şifreler eşleşmiyor.', 'error'); return; }

            btn.disabled = true;
            btn.textContent = 'Güncelleniyor...';
            dbg.textContent = 'updateUser çağrılıyor...';

            try {
                var r = await sb.auth.updateUser({ password: pw });
                dbg.textContent = 'updateUser döndü: error=' + (r.error ? r.error.message : 'yok') + ' user=' + (r.data && r.data.user ? r.data.user.email : 'yok');
                if (r.error) {
                    showMsg('Hata: ' + r.error.message, 'error');
                    btn.disabled = false;
                    btn.textContent = 'Şifremi Güncelle';
                } else {
                    document.getElementById('title').textContent = 'Şifren Güncellendi';
                    document.getElementById('subtitle').textContent = 'Yeni şifrenle uygulamaya giriş yapabilirsin.';
                    document.getElementById('form-area').classList.add('hidden');
                    document.getElementById('msg-box').classList.add('hidden');
                    dbg.textContent = '';
                }
            } catch (e) {
                showMsg('Hata: ' + e.message, 'error');
                dbg.textContent = 'catch: ' + e.message;
                btn.disabled = false;
                btn.textContent = 'Şifremi Güncelle';
            }
        });

        init();
    </script>
</body>
</html>
